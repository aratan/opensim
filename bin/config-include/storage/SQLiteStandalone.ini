; These are the initialization settings for running OpenSim Standalone with an SQLite database

[DatabaseService]
    StorageProvider = "OpenSim.Data.SQLite.dll"
    ConnectionString = "URI=file:OpenSim.db;UseUTF16Encoding=True;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[AssetService]
    ConnectionString = "URI=file:Asset.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

; The HGAssetService section controls the connection given to the AssetService in a Hypergrid configuration.
; This has to be separate from [AssetService] because the Hypergrid facing connector uses [HGAssetService] for its config data instead.
; However, the internal asset service will still use the [AssetService] section.
; Therefore, you will almost certainly want the ConnectionString in [HGAssetService] to be the same as in [AssetService]
; so that they both access the same database.
; This issue does not apply to normal MySQL/MSSQL configurations, since by default they use the settings in [DatabaseService] and
; do not have separate connection strings for different services.
[HGAssetService]
    ConnectionString = "URI=file:Asset.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[InventoryService]
    ;ConnectionString = "URI=file:inventory.db"
    ; if you have a legacy inventory store use the connection string below
    ConnectionString = "URI=file:inventory.db;UseUTF16Encoding=True;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[AvatarService]
    ConnectionString = "URI=file:avatars.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[AuthenticationService]
    ConnectionString = "URI=file:auth.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[UserAccountService]
    ConnectionString = "URI=file:userprofiles.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[GridUserService]
    ConnectionString = "URI=file:griduser.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

[FriendsService]
    ConnectionString = "URI=file:friends.db;journal_mode=WAL;synchronous=NORMAL;temp_store=MEMORY;cache_size=-64000"

; OPTIMIZACIONES APLICADAS 2026-07:
; - journal_mode=WAL: lecturas y escrituras simultáneas, elimina bloqueos cruzados entre
;   servicios (AssetService, InventoryService) que son la causa principal de "Service unreachable"
;   en el visor cuando el avatar se mueve.
; - synchronous=NORMAL: sqlite hace fsync solo en checkpoints, no en cada commit. Seguro en
;   standalone (un solo proceso), ahorra ~30% latencia de I/O.
; - temp_store=MEMORY: tablas temporales (joins, sort) en RAM, no en disco.
; - cache_size=-64000: 64MB de cache de página de SQLite (negativo = KB). Acelera lecturas
;   repetidas a las mismas texturas, prims, prims inventario.

